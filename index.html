<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvino Man - Moda Masculina Premium</title>
    <style>
        /* Estilos Globais - Inspirados na paleta escura da imagem 24 */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #121212; /* Preto Profundo */
            color: #E0E0E0; /* Cinza Claro para leitura */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px; /* Largura perfeita para celular */
            text-align: center;
            padding: 40px 20px;
        }

        /* Perfil - Logo e Nome */
        .profile-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* Foto Redonda */
            border: 3px solid #C0C0C0; /* Borda Prata, como o logo */
            margin-bottom: 15px;
        }

        .profile-name {
            font-size: 24px;
            font-weight: bold;
            color: #FFFFFF;
            margin: 0;
        }

        .profile-bio {
            font-size: 16px;
            color: #A0A0A0;
            margin: 10px 0 30px 0;
        }

        /* Botões de Link (O Coração do Site) */
        .link-item {
            display: block;
            background-color: #1F1F1F; /* Cinza Escuro */
            color: #FFFFFF;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid #333;
            transition: all 0.3s ease; /* Animação suave */
        }

        /* Destaque para o WhatsApp (Sua prioridade) */
        .link-item.whatsapp {
            background-color: #25D366; /* Verde Oficial WhatsApp */
            color: #FFFFFF;
            font-size: 20px;
            border: none;
        }

        /* Efeito de passar o mouse (para desktop) */
        .link-item:hover {
            transform: scale(1.03); /* Aumenta levemente */
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        /* Ícones e Rodapé */
        .social-icons {
            margin-top: 40px;
            font-size: 24px;
        }

        .social-icons a {
            color: #A0A0A0;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        .social-icons a:hover {
            color: #FFFFFF;
        }

    </style>
</head>
<body>
    <div class="container">
        <img src="sua-logo.jpg" alt="Marvino Moda Masculina Logo" class="profile-logo">
        
        <h1 class="profile-name">MARVINO</h1>
        <p class="profile-bio">Moda Masculina Premium | Ofertas Reais Todos os Dias</p>

        <a href="https://chat.whatsapp.com/G0YXU9..." class="link-item whatsapp">
            🚀 ENTRE NO GRUPO VIP E RECEBA ANTES
        </a>

        <a href="https://www.instagram.com/marvino.man" class="link-item">
            📸 Siga-nos no Instagram
        </a>

        <a href="https://www.tiktok.com/@marvino.man" class="link-item">
            🎵 Ofertas no TikTok
        </a>

    </div>
</body>
</html>
