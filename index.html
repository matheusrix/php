<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvino Man - Ofertas Premium</title>
    <style>
        :root {
            --primary-blue: #007aff;
            --whatsapp-green: #25D366;
            --dark-bg: #000000;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Gradiente radial para criar o efeito de "luz" no centro */
            background: radial-gradient(circle at center, #001a33 0%, #000000 100%);
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        /* Foto de Perfil com brilho */
        .profile-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 2px solid var(--primary-blue);
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.5);
            margin-bottom: 20px;
            object-fit: cover;
        }

        .headline {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .headline span {
            color: var(--primary-blue);
        }

        .sub-headline {
            font-size: 14px;
            color: #b0b0b0;
            margin-bottom: 30px;
        }

        /* Botão Principal Estilo WhatsApp */
        .btn-main {
            display: block;
            background-color: var(--whatsapp-green);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            transition: transform 0.2s;
            animation: pulse 2s infinite;
        }

        /* Botões Secundários Glassmorphism */
        .btn-secondary {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Badge de Vagas Restantes */
        .vagas-badge {
            display: inline-block;
            margin-top: 20px;
            padding: 5px 15px;
            border: 1px solid #ff4444;
            border-radius: 20px;
            color: #ff4444;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Animações */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .stats {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="sua-foto.jpg" alt="Marvino" class="profile-logo">

        <div class="headline">
            Te ajudo a <span>comprar com desconto!</span>
        </div>
        
        <p class="sub-headline">
            Receba ofertas reais de moda masculina com até <b>70% OFF</b> direto no seu celular.
        </p>

        <a href="https://chat.whatsapp.com/G0YXU9OQNJr361DaxPTYTD" class="btn-main">
            Acessar Grupo Gratuito
        </a>
        
        <div class="stats">Mais de 100.000 membros ativos</div>

        <div class="vagas-badge">Restam apenas 25 vagas</div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">

        <a href="https://www.instagram.com/marvino_man" class="btn-secondary">📸 Siga no Instagram</a>
        <a href="https://www.tiktok.com/@.marvino.man" class="btn-secondary">🎵 Ofertas no TikTok</a>
    </div>

</body>
</html>
